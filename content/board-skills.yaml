# Board Skills Matrix
# Updated: May 2026 - Emphasizing differentiators and unique value

introduction:
  title: "Board Skills Matrix"
  description: >
    Expert-level competencies across strategic, operational, and governance dimensions
    essential for effective board service. Self-assessed proficiency based on 30+ years of
    executive leadership experience.

# Proficiency levels: Expert (5), Advanced (4), Proficient (3), Developing (2), Basic (1)

skills_categories:
  governance_strategic:
    title: "Governance & Strategic Advisory"
    description: "Board governance, strategic networks, and fiduciary oversight"
    skills:
      - skill: "Board Governance & Independence"
        level: 5
        description: "Executive board experience with deep understanding of fiduciary responsibilities and audit/risk oversight"

      - skill: "Capital Allocation & ROI Discipline"
        level: 5
        description: "Managed budgets up to INR 3B with consistent ROI delivery and regulatory compliance"

      - skill: "C-Suite Network Leverage"
        level: 5
        description: "Strategic counsel backed by C-level relationships at Microsoft, SAP, Oracle, Deloitte, PwC, Accenture, E&Y, IBM"

      - skill: "Political & Investment Leader Access"
        level: 5
        description: "Direct access to NSE Chairman, HDFC leadership, Werburgh Pincus, Deputy CM & CM Maharashtra, key MPs/MLAs"

      - skill: "Strategic Advisory Across Ecosystems"
        level: 5
        description: "Extensive network including sports icons (Tendulkar, Dravid, Sharma), Bollywood (Shetty, Khan, Bachchan), business leaders (Podar family)"

  technology_ai_data:
    title: "Technology, AI & Data"
    description: "Deep technical fluency with hands-on AI capability"
    skills:
      - skill: "AI/ML Strategy & Hands-On Capability"
        level: 5
        description: "Pattern recognition at scale; extensive use of ChatGPT, Codex, Claude Code, Claude Cowork, Google Gemini, and more AI tools for enterprise solutions"

      - skill: "Data Analytics & Business Intelligence"
        level: 5
        description: "Expert at numbers, visualization, and strategic insight from data; implemented real-time dashboards for executive boards"

      - skill: "Cybersecurity & Zero-Trust Architecture"
        level: 5
        description: "Enterprise security systems, managed global risk across 14 countries with cloud economics expertise"

      - skill: "Platform Modernization - ERP"
        level: 5
        description: "Led 6 world-class ERP implementations (SAP/Oracle/Infor) with proven transformation track record"

      - skill: "AI-Enhanced Analytics Edge"
        level: 5
        description: "Hands-on AI capability provides strategic advantage in finding patterns and deep business insights"

  large_scale_execution:
    title: "Large-Scale Execution"
    description: "Infrastructure delivery and complex program management"
    skills:
      - skill: "Warehouse Automation & Robotics"
        level: 5
        description: "Cross-border logistics automation with AutoStore, Geek+, T-Sorter across 18 global warehouses"

      - skill: "Infrastructure Delivery"
        level: 5
        description: "Built warehouses from scratch, managed cross-country pipelines, nuclear powerplants, oil refineries, corporate offices"

      - skill: "GCC Setup & Legal Entity Formation"
        level: 5
        description: "Established Global Capability Centers, scaled legal entities, accelerated start-ups from ground up"

      - skill: "Event Management at Scale"
        level: 5
        description: "Concept-to-execution delivery of large-scale events and programs"

      - skill: "Complex Program Management"
        level: 5
        description: "Led INR 3B technology portfolio, managed transformations affecting 10,000+ users across 120 countries"

  multidimensional_people:
    title: "Multidimensional People Leadership"
    description: "Elite to frontline workforce management across cultures"
    skills:
      - skill: "Elite Leadership Hiring & Org Design"
        level: 5
        description: "Built global delivery centers, scaled 100+ engineer teams, developed C-suite leadership pipelines"

      - skill: "Multi-Country Workforce Management"
        level: 5
        description: "Led 2,500+ professionals across 14 countries with varied cultures, customs, and generational gaps"

      - skill: "Blue/White Collar Leadership"
        level: 5
        description: "Managed elite corporate leaders, white collar at scale, and blue collar workers across warehousing, logistics, manufacturing facilities"

      - skill: "Union & Labor Management"
        level: 5
        description: "Experience with union negotiations, labor management, and global workforce cultural alignment"

      - skill: "Executive Communication & Stakeholder Orchestration"
        level: 5
        description: "Board-level presentations, keynote speaker at SAP Sapphire, CTO Forum; multilingual cross-cultural leadership"

# Overall board readiness score
overall_assessment:
  readiness_score: 95
  summary: >
    Exceptional board readiness with unique differentiators: global multi-dimensional network spanning
    C-suite, political, investment, sports, and entertainment sectors; hands-on AI capability providing
    strategic edge; proven large-scale infrastructure delivery; and rare ability to lead across elite,
    white collar, and blue collar workforce segments. 30+ years C-suite experience with measurable impact.

  strengths:
    - "Global network as strategic asset (C-suite, political, investment leaders)"
    - "Hands-on AI & data analytics capability (ChatGPT, Claude, Gemini)"
    - "Large-scale infrastructure execution (warehouses, pipelines, refineries)"
    - "Multidimensional people leadership (elite to blue collar, union to non-union)"
    - "Financial stewardship of multi-billion dollar budgets with ROI discipline"

  development_areas:
    - "Formal board certification programs (IDP, INSEAD)"
    - "Additional M&A transaction experience"
    - "Deepen financial services/fintech sector expertise"

