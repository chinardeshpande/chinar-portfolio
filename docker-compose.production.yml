version: '3.8'

services:
  # ==================================
  # Next.js Portfolio Application
  # ==================================
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: portfolio-app-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID}
      SEARCH_CONSOLE_SITE_URL: ${SEARCH_CONSOLE_SITE_URL}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portfolio-network
    labels:
      - "com.portfolio.service=app"
      - "com.portfolio.environment=production"

  # ==================================
  # Nginx Reverse Proxy
  # ==================================
  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL certificates (Let's Encrypt)
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      # Nginx cache
      - nginx_cache:/var/cache/nginx
      # Nginx logs
      - ./logs/nginx:/var/log/nginx
    depends_on:
      portfolio:
        condition: service_healthy
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.portfolio.service=nginx"
      - "com.portfolio.environment=production"

  # ==================================
  # Certbot for SSL Certificate
  # ==================================
  certbot:
    image: certbot/certbot
    container_name: portfolio-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - portfolio-network

volumes:
  nginx_cache:
    driver: local

networks:
  portfolio-network:
    name: portfolio-production-network
    driver: bridge
