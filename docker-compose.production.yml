version: '3.8'

services:
  # ==================================
  # Next.js Portfolio Application
  # ==================================
  # Exposed on host port 3001, proxied by system nginx
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: portfolio-app-prod
    restart: unless-stopped
    ports:
      - "3001:3000"  # Expose on host port 3001 (HRMS uses 3000)
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN}
      GA4_PROPERTY_ID: ${GA4_PROPERTY_ID}
      SEARCH_CONSOLE_SITE_URL: ${SEARCH_CONSOLE_SITE_URL}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.portfolio.service=app"
      - "com.portfolio.environment=production"
